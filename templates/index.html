<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>SkyCompare | Flight Search</title>
    <style>
        body { background-color: #111; color: #f0f0f0; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: #f0f0f0; }
        .form-control, .form-select {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #f0f0f0;
        }
        .form-control:focus, .form-select:focus {
            background-color: #2a2a2a;
            border-color: #C0392B;
            color: #f0f0f0;
            box-shadow: 0 0 0 0.2rem rgba(192,57,43,0.35);
        }
        .form-control::placeholder { color: #888; }
        .form-label { color: #ccc; font-weight: 600; font-size: 0.85rem; }
        .btn-primary {
            background-color: #C0392B;
            border-color: #C0392B;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .btn-primary:hover { background-color: #a93226; border-color: #a93226; }
        h1.brand { color: #C0392B; }
        .section-label {
            color: #C0392B;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
            margin-bottom: 16px;
        }
        .priority-badge {
            display: inline-block;
            background: #C0392B;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            text-align: center;
            line-height: 22px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-right: 6px;
        }
        select option { background-color: #2a2a2a; color: #f0f0f0; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold brand">SkyCompare</h1>
            <p class="text-secondary">Your Priorities. Your Flight.</p>
        </div>

        <div class="card shadow p-4 mx-auto" style="max-width: 620px;">
            <form action="/search" method="POST">

                <div class="section-label">Flight Details</div>
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">From</label>
                        <input type="text" name="origin" class="form-control"
                               placeholder="e.g. Atlanta or ATL" required>
                    </div>
                    <div class="col">
                        <label class="form-label">To</label>
                        <input type="text" name="dest" class="form-control"
                               placeholder="e.g. Los Angeles or LAX" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Departure Date</label>
                    <input type="date" name="date" class="form-control" required>
                </div>

                <div class="section-label">What matters most to you?</div>
                <p class="text-secondary small mb-3">Rank your top 3 priorities. #1 carries the most weight.</p>

                <div class="mb-3">
                    <label class="form-label">
                        <span class="priority-badge">1</span> Most Important
                    </label>
                    <select name="priority_1" class="form-select" id="p1">
                        <option value="price">Price</option>
                        <option value="timing">Flight Duration</option>
                        <option value="direct">Direct Routes</option>
                        <option value="baggage">Baggage Policy</option>
                        <option value="comfort">Seat Comfort</option>
                        <option value="service">Customer Service</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <span class="priority-badge">2</span> 2nd Most Important
                    </label>
                    <select name="priority_2" class="form-select" id="p2">
                        <option value="price">Price</option>
                        <option value="timing" selected>Flight Duration</option>
                        <option value="direct">Direct Routes</option>
                        <option value="baggage">Baggage Policy</option>
                        <option value="comfort">Seat Comfort</option>
                        <option value="service">Customer Service</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        <span class="priority-badge">3</span> 3rd Most Important
                    </label>
                    <select name="priority_3" class="form-select" id="p3">
                        <option value="price">Price</option>
                        <option value="timing">Flight Duration</option>
                        <option value="direct" selected>Direct Routes</option>
                        <option value="baggage">Baggage Policy</option>
                        <option value="comfort">Seat Comfort</option>
                        <option value="service">Customer Service</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">Find My Best Flight</button>
            </form>
        </div>
    </div>

    <script>
        // Prevent the same factor from being picked in two dropdowns
        const selects = [document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3')];

        selects.forEach((sel, i) => {
            sel.addEventListener('change', () => {
                const taken = selects.filter((_, j) => j !== i).map(s => s.value);
                selects.forEach((s, j) => {
                    [...s.options].forEach(opt => {
                        const otherTaken = selects.filter((_, k) => k !== j).map(x => x.value);
                        opt.disabled = otherTaken.includes(opt.value) && opt.value !== s.value;
                    });
                });
            });
        });

        // Run once on load to set initial disabled state
        selects[0].dispatchEvent(new Event('change'));
    </script>
</body>
</html>
