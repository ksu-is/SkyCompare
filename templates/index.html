<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>SkyCompare | Flight Search</title>
    <style>
        body { background-color: #111; color: #f0f0f0; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: #f0f0f0; }
        .form-control, .form-select {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #f0f0f0;
        }
        .form-control:focus, .form-select:focus {
            background-color: #2a2a2a;
            border-color: #C0392B;
            color: #f0f0f0;
            box-shadow: 0 0 0 0.2rem rgba(192,57,43,0.35);
        }
        .form-control::placeholder { color: #888; }
        .form-label { color: #ccc; font-weight: 600; font-size: 0.85rem; }
        .btn-primary {
            background-color: #C0392B;
            border-color: #C0392B;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .btn-primary:hover { background-color: #a93226; border-color: #a93226; }
        h1.brand { color: #C0392B; }
        .section-label {
            color: #C0392B;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
            margin-bottom: 16px;
        }
        .priority-badge {
            display: inline-block;
            background: #C0392B;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            text-align: center;
            line-height: 22px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-right: 6px;
        }
        select option { background-color: #2a2a2a; color: #f0f0f0; }
        .airport-wrapper { position: relative; }
        .airport-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #2a2a2a;
            border: 1px solid #C0392B;
            border-top: none;
            border-radius: 0 0 6px 6px;
            z-index: 1000;
            max-height: 220px;
            overflow-y: auto;
        }
        .airport-option {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.88rem;
            color: #f0f0f0;
        }
        .airport-option:hover, .airport-option.active { background: #C0392B; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold brand">SkyCompare</h1>
            <p class="text-secondary">Your Priorities. Your Flight.</p>
        </div>

        <div class="card shadow p-4 mx-auto" style="max-width: 620px;">
            <form action="/search" method="POST">

                <div class="section-label">Flight Details</div>
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">From</label>
                        <div class="airport-wrapper">
                            <input type="text" id="origin_display" class="form-control"
                                   placeholder="City or airport code" autocomplete="off" required>
                            <input type="hidden" name="origin" id="origin_code">
                            <div class="airport-dropdown" id="origin_dropdown"></div>
                        </div>
                    </div>
                    <div class="col">
                        <label class="form-label">To</label>
                        <div class="airport-wrapper">
                            <input type="text" id="dest_display" class="form-control"
                                   placeholder="City or airport code" autocomplete="off" required>
                            <input type="hidden" name="dest" id="dest_code">
                            <div class="airport-dropdown" id="dest_dropdown"></div>
                        </div>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Departure Date</label>
                    <input type="date" name="date" class="form-control" required>
                </div>

                <div class="section-label">What matters most to you?</div>
                <p class="text-secondary small mb-3">Rank your top 3 priorities. #1 carries the most weight.</p>

                <div class="mb-3">
                    <label class="form-label">
                        <span class="priority-badge">1</span> Most Important
                    </label>
                    <select name="priority_1" class="form-select" id="p1">
                        <option value="price">Price</option>
                        <option value="timing">Flight Duration</option>
                        <option value="direct">Direct Routes</option>
                        <option value="baggage">Baggage Policy</option>
                        <option value="comfort">Seat Comfort</option>
                        <option value="service">Customer Service</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <span class="priority-badge">2</span> 2nd Most Important
                    </label>
                    <select name="priority_2" class="form-select" id="p2">
                        <option value="price">Price</option>
                        <option value="timing" selected>Flight Duration</option>
                        <option value="direct">Direct Routes</option>
                        <option value="baggage">Baggage Policy</option>
                        <option value="comfort">Seat Comfort</option>
                        <option value="service">Customer Service</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        <span class="priority-badge">3</span> 3rd Most Important
                    </label>
                    <select name="priority_3" class="form-select" id="p3">
                        <option value="price">Price</option>
                        <option value="timing">Flight Duration</option>
                        <option value="direct" selected>Direct Routes</option>
                        <option value="baggage">Baggage Policy</option>
                        <option value="comfort">Seat Comfort</option>
                        <option value="service">Customer Service</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">Find My Best Flight</button>
            </form>
        </div>
    </div>

    <script>
        // ── Airport autocomplete ─────────────────────────────────────────
        const AIRPORTS = [
            {code:"ATL",name:"Atlanta — Hartsfield-Jackson (ATL)"},
            {code:"LAX",name:"Los Angeles (LAX)"},
            {code:"JFK",name:"New York — JFK (JFK)"},
            {code:"EWR",name:"Newark (EWR)"},
            {code:"LGA",name:"New York — LaGuardia (LGA)"},
            {code:"ORD",name:"Chicago — O'Hare (ORD)"},
            {code:"MDW",name:"Chicago — Midway (MDW)"},
            {code:"DFW",name:"Dallas/Fort Worth (DFW)"},
            {code:"DAL",name:"Dallas — Love Field (DAL)"},
            {code:"MIA",name:"Miami (MIA)"},
            {code:"MCO",name:"Orlando (MCO)"},
            {code:"SFO",name:"San Francisco (SFO)"},
            {code:"SEA",name:"Seattle-Tacoma (SEA)"},
            {code:"DEN",name:"Denver (DEN)"},
            {code:"LAS",name:"Las Vegas (LAS)"},
            {code:"BOS",name:"Boston — Logan (BOS)"},
            {code:"DCA",name:"Washington — Reagan (DCA)"},
            {code:"IAD",name:"Washington — Dulles (IAD)"},
            {code:"IAH",name:"Houston — Intercontinental (IAH)"},
            {code:"HOU",name:"Houston — Hobby (HOU)"},
            {code:"PHX",name:"Phoenix (PHX)"},
            {code:"MSP",name:"Minneapolis (MSP)"},
            {code:"DTW",name:"Detroit (DTW)"},
            {code:"CLT",name:"Charlotte (CLT)"},
            {code:"PHL",name:"Philadelphia (PHL)"},
            {code:"SLC",name:"Salt Lake City (SLC)"},
            {code:"PDX",name:"Portland (PDX)"},
            {code:"SAN",name:"San Diego (SAN)"},
            {code:"TPA",name:"Tampa (TPA)"},
            {code:"BNA",name:"Nashville (BNA)"},
            {code:"MSY",name:"New Orleans (MSY)"},
            {code:"MEM",name:"Memphis (MEM)"},
            {code:"MCI",name:"Kansas City (MCI)"},
            {code:"STL",name:"St. Louis (STL)"},
            {code:"BWI",name:"Baltimore (BWI)"},
            {code:"PIT",name:"Pittsburgh (PIT)"},
            {code:"CLE",name:"Cleveland (CLE)"},
            {code:"CMH",name:"Columbus (CMH)"},
            {code:"IND",name:"Indianapolis (IND)"},
            {code:"CVG",name:"Cincinnati (CVG)"},
            {code:"RDU",name:"Raleigh-Durham (RDU)"},
            {code:"AUS",name:"Austin (AUS)"},
            {code:"SAT",name:"San Antonio (SAT)"},
            {code:"SMF",name:"Sacramento (SMF)"},
            {code:"OAK",name:"Oakland (OAK)"},
            {code:"SJC",name:"San Jose (SJC)"},
            {code:"FLL",name:"Fort Lauderdale (FLL)"},
            {code:"JAX",name:"Jacksonville (JAX)"},
            {code:"HNL",name:"Honolulu (HNL)"},
            {code:"ANC",name:"Anchorage (ANC)"},
            {code:"SDF",name:"Louisville (SDF)"},
            {code:"BUF",name:"Buffalo (BUF)"},
            {code:"MKE",name:"Milwaukee (MKE)"},
            {code:"BOI",name:"Boise (BOI)"},
            {code:"GEG",name:"Spokane (GEG)"},
            {code:"RNO",name:"Reno (RNO)"},
            {code:"ABQ",name:"Albuquerque (ABQ)"},
            {code:"TUS",name:"Tucson (TUS)"},
            {code:"ELP",name:"El Paso (ELP)"},
            {code:"OKC",name:"Oklahoma City (OKC)"},
            {code:"TUL",name:"Tulsa (TUL)"},
            {code:"OMA",name:"Omaha (OMA)"},
            {code:"RIC",name:"Richmond (RIC)"},
            {code:"ORF",name:"Norfolk (ORF)"},
            {code:"GSP",name:"Greenville-Spartanburg (GSP)"},
            {code:"CHS",name:"Charleston (CHS)"},
            {code:"SAV",name:"Savannah (SAV)"},
            {code:"TYS",name:"Knoxville (TYS)"},
            {code:"BHM",name:"Birmingham (BHM)"},
            {code:"LIT",name:"Little Rock (LIT)"},
            {code:"BTR",name:"Baton Rouge (BTR)"},
            {code:"JAN",name:"Jackson (JAN)"},
            {code:"BUR",name:"Burbank (BUR)"},
            {code:"LGB",name:"Long Beach (LGB)"},
            {code:"ONT",name:"Ontario (ONT)"},
            {code:"PSP",name:"Palm Springs (PSP)"},
            {code:"SBA",name:"Santa Barbara (SBA)"},
            {code:"FAT",name:"Fresno (FAT)"},
        ];

        function setupAirport(displayId, codeId, dropdownId) {
            const display  = document.getElementById(displayId);
            const code     = document.getElementById(codeId);
            const dropdown = document.getElementById(dropdownId);
            let activeIdx  = -1;

            display.addEventListener('input', () => {
                const val = display.value.trim().toLowerCase();
                code.value = '';
                activeIdx  = -1;
                if (!val) { dropdown.style.display = 'none'; return; }

                const hits = AIRPORTS.filter(a =>
                    a.name.toLowerCase().includes(val) || a.code.toLowerCase().startsWith(val)
                ).slice(0, 8);

                if (!hits.length) { dropdown.style.display = 'none'; return; }

                dropdown.innerHTML = hits.map((a, i) =>
                    `<div class="airport-option" data-code="${a.code}" data-name="${a.name}" data-idx="${i}">${a.name}</div>`
                ).join('');
                dropdown.style.display = 'block';
            });

            display.addEventListener('keydown', e => {
                const opts = dropdown.querySelectorAll('.airport-option');
                if (!opts.length) return;
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    activeIdx = Math.min(activeIdx + 1, opts.length - 1);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    activeIdx = Math.max(activeIdx - 1, 0);
                } else if (e.key === 'Enter' && activeIdx >= 0) {
                    e.preventDefault();
                    opts[activeIdx].click();
                    return;
                } else if (e.key === 'Escape') {
                    dropdown.style.display = 'none'; return;
                }
                opts.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
            });

            dropdown.addEventListener('mousedown', e => {
                const opt = e.target.closest('.airport-option');
                if (!opt) return;
                display.value = opt.dataset.name;
                code.value    = opt.dataset.code;
                dropdown.style.display = 'none';
            });

            document.addEventListener('click', e => {
                if (!display.contains(e.target) && !dropdown.contains(e.target))
                    dropdown.style.display = 'none';
            });
        }

        setupAirport('origin_display', 'origin_code', 'origin_dropdown');
        setupAirport('dest_display',   'dest_code',   'dest_dropdown');

        // On submit, fall back to raw display text if user didn't pick from list
        document.querySelector('form').addEventListener('submit', () => {
            const oCode = document.getElementById('origin_code');
            const dCode = document.getElementById('dest_code');
            if (!oCode.value) oCode.value = document.getElementById('origin_display').value.trim();
            if (!dCode.value) dCode.value = document.getElementById('dest_display').value.trim();
        });

        // ── Priority dropdowns: prevent duplicate selection ──────────────
        const selects = [document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3')];

        selects.forEach((sel, i) => {
            sel.addEventListener('change', () => {
                selects.forEach((s, j) => {
                    const otherTaken = selects.filter((_, k) => k !== j).map(x => x.value);
                    [...s.options].forEach(opt => {
                        opt.disabled = otherTaken.includes(opt.value) && opt.value !== s.value;
                    });
                });
            });
        });

        selects[0].dispatchEvent(new Event('change'));
    </script>
</body>
</html>
